<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  :root {
    --bg:     #060611;
    --text:   #e8ecf8;
    --text2:  #a0a8c8;
    --accent: #818cf8;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:     #eef0f7;
      --text:   #0d1117;
      --text2:  #2e3554;
      --accent: #4f46e5;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Aptos', 'Aptos Display', 'Segoe UI', system-ui, sans-serif;
    user-select: none;
  }
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: 6px;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .title {
    font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
    color: var(--text); text-align: center; line-height: 1.1;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 10px; font-weight: 600; letter-spacing: 4px;
    color: var(--text2); text-transform: uppercase;
    margin-bottom: 36px; opacity: 0.85;
  }
  .dots { display: flex; gap: 8px; }
  .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.3s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,80%,100% { opacity:.25; transform:scale(.75); }
    40%         { opacity:1;   transform:scale(1);   }
  }
</style>
</head>
<body>
  <div class="badge">Smart Money Concepts</div>
  <div class="title">The SMC<br/>Trading App</div>
  <div class="subtitle">by TheEoneYedWonder</div>
  <div class="dots"><span></span><span></span><span></span></div>
</body>
</html>
