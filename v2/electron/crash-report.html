<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Error Report — The SMC Trading App</title>
<style>
  :root {
    --bg:      #060611; --surface: #0c0c1e; --surf2: #101022; --surf3: #141430;
    --border:  #1a1a30; --border2: #22223c;
    --text:    #e8ecf8; --text2:   #a0a8c8; --muted: #6b7299;
    --indigo:  #818cf8; --indigo2: #6366f1; --red: #fb7185; --green: #34d399;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Aptos', 'Aptos Display', 'Segoe UI', system-ui, sans-serif;
    font-size: 13px; height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── Header ── */
  .header {
    padding: 14px 18px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    -webkit-app-region: drag;
  }
  .header-icon {
    width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
    background: rgba(251,113,133,.12); border: 1px solid rgba(251,113,133,.25);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .header-title { font-size: 14px; font-weight: 700; }
  .header-sub   { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── Body ── */
  .body {
    flex: 1; overflow-y: auto; padding: 16px 18px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .error-box {
    background: rgba(251,113,133,.07); border: 1px solid rgba(251,113,133,.2);
    border-radius: 6px; padding: 10px 12px;
  }
  .error-name    { font-size: 11px; color: var(--red); font-weight: 700; letter-spacing: .5px; margin-bottom: 4px; }
  .error-message { font-size: 12px; color: var(--text2); line-height: 1.55; word-break: break-word; }

  label {
    display: block; margin-bottom: 6px;
    font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .5px;
  }
  textarea {
    width: 100%; padding: 10px 12px; resize: none;
    background: var(--surf2); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: inherit; font-size: 12px; line-height: 1.5;
    outline: none; transition: border-color .15s;
  }
  textarea:focus { border-color: var(--indigo); }
  textarea::placeholder { color: var(--muted); }

  /* ── Footer ── */
  .footer {
    padding: 11px 18px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .status          { flex: 1; font-size: 11px; color: var(--text2); }
  .status.success  { color: var(--green); }
  .status.fail     { color: var(--red); }

  .btn {
    padding: 7px 18px; border-radius: 6px; border: none; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600; transition: opacity .15s;
  }
  .btn:disabled { opacity: .38; cursor: not-allowed; }
  .btn-primary { background: var(--indigo2); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: .85; }
  .btn-ghost {
    background: var(--surf2); color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surf3); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚠</div>
  <div>
    <div class="header-title">Something went wrong</div>
    <div class="header-sub">Help us fix it by sending a crash report</div>
  </div>
</div>

<div class="body">
  <div class="error-box">
    <div class="error-name" id="errName">Error</div>
    <div class="error-message" id="errMsg">An unexpected error occurred.</div>
  </div>

  <div>
    <label for="desc">What were you doing when this happened?</label>
    <textarea id="desc" rows="5"
      placeholder="e.g. I clicked Analyze after switching to XAUUSD on H4, then the app froze…"></textarea>
  </div>
</div>

<div class="footer">
  <div class="status" id="status"></div>
  <button class="btn btn-ghost"   id="btnDismiss" onclick="dismiss()">Dismiss</button>
  <button class="btn btn-primary" id="btnSend"    onclick="sendReport()">Send Report</button>
</div>

<script>
  // Populate error info
  window.crashAPI.getError().then(data => {
    if (!data) return;
    document.getElementById('errName').textContent = data.name    ?? 'Error';
    document.getElementById('errMsg').textContent  = data.message ?? 'An unexpected error occurred.';
  });

  async function sendReport() {
    const desc       = document.getElementById('desc').value.trim();
    const btnSend    = document.getElementById('btnSend');
    const btnDismiss = document.getElementById('btnDismiss');
    const status     = document.getElementById('status');

    btnSend.disabled    = true;
    btnDismiss.disabled = true;
    status.className    = 'status';
    status.textContent  = 'Sending…';

    const result = await window.crashAPI.submit(desc);

    if (result?.github?.ok) {
      const num = result.github.url?.split('/').pop();
      status.textContent = `Report sent ✓  (GitHub issue #${num})`;
      status.className   = 'status success';
    } else if (result?.logFile) {
      status.textContent = `Saved locally. ${result.github?.reason ?? '(GitHub not configured)'}`;
      status.className   = 'status';
    } else {
      status.textContent = 'Could not send report.';
      status.className   = 'status fail';
    }

    btnSend.textContent     = 'Sent';
    btnDismiss.disabled     = false;
    btnDismiss.textContent  = 'Close';
  }

  function dismiss() {
    window.crashAPI.dismiss();
  }
</script>
</body>
</html>
